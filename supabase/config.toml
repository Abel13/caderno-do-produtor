project_id = "caderno-do-produtor"

[api]
enabled = true
port = 57321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 57322
shadow_port = 57320
major_version = 17

[db.pooler]
enabled = false
port = 57329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 57323
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 57324

[analytics]
enabled = true
port = 57327
backend = "postgres"

[auth]
enabled = true
site_url = "http://localhost:3020"
additional_redirect_urls = ["http://127.0.0.1:3020/auth/callback", "http://localhost:3020/auth/callback"]
enable_signup = true
enable_anonymous_sign_ins = false

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
redirect_uri = "http://127.0.0.1:57321/auth/v1/callback"

[storage]
enabled = true
file_size_limit = "25MiB"
